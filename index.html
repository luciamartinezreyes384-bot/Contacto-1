<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formularios - SUB 2</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 600px; margin: 2rem auto; padding: 0 1rem; }
        form { background: #f5f5f5; padding: 2rem; border-radius: 8px; margin-bottom: 2rem; }
        label { display: block; margin: 0.5rem 0 0.2rem; }
        input { width: 100%; padding: 0.5rem; margin-bottom: 1rem; border: 1px solid #ddd; border-radius: 4px; }
        button { background: #007bff; color: white; border: none; padding: 0.7rem 1.5rem; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>

    <!-- Actividad 1: Formulario de Contacto -->
    <h2>Formulario de Contacto</h2>
    <form>
        <label for="nombre">Nombre *</label>
        <input type="text" id="nombre" name="nombre" required>

        <label for="apellido">Apellido *</label>
        <input type="text" id="apellido" name="apellido" required>

        <label for="telefono">Teléfono *</label>
        <input type="tel" id="telefono" name="telefono" required>

        <button type="submit">Enviar</button>
    </form>

    <!-- Actividad 2: Formulario de Suscripción -->
    <h2>Formulario de Suscripción</h2>
    <form>
        <label for="email">Correo electrónico *</label>
        <input type="email" id="email" name="email" required>

        <label>
            <input type="checkbox" required>
            Acepto los términos y condiciones *
        </label>
        <br><br>

        <button type="submit">Suscribirme</button>
    </form>

</body>
</html>
